<!DOCTYPE html>
{%load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donor Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{%static 'style.css'%}" />
    <script>
function displayFullName() {
    var request = new XMLHttpRequest();
	var input = document.getElementById("t2").value;
	var data = ""
	data = data + document.getElementById("t1").value+"\n"
	data = data + "You: "+input+"\n"
	request.open("GET", "http://127.0.0.1:8000/donor/ChatAction?mytext="+input);
	request.onreadystatechange = function() {
    if(this.readyState === 4 && this.status === 200) {
	    data = data + "Chatbot: "+this.responseText+"\n"
		document.getElementById("t1").innerHTML = data;
        }
    };
	request.send();
}
</script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">
        <div id="header">
          <img
            src="https://cdn.pixabay.com/photo/2014/04/02/10/47/red-304570_640.png"
            alt="Blood Bank Logo"
            class="logo"
          />
        </div>
        <a class="navbar-brand" href="/"
          >Blood Bank Management System</a
        >
        <a href="/login"><button class="btn btn-outline-light" id="logoutButton">Logout</button></a>

      </div>
    </nav>
    <script>
      document
        .getElementById("logoutButton")
        .addEventListener("click", function () {
          document.getElementById("logoutMessage").style.display = "block";
          setTimeout(function () {
            window.location.href = "index.html";
          }, 2000);
        });
    </script>
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-2 sidebar">
          <a href="/donor/home">Home</a>
          <a href="/donor/profile">Profile</a>
          <a href="/donor/Request">Donate Blood</a>
          <a href="/donor/ViewDonations">View Donations</a>
            <a href="/donor/chatbot">Chatbot</a>
          <a href="/donor/ViewAlert">View Alert</a>
          <a href="/donor/Predict">Predict Next Eligibility Months</a>

        </div>
        <!-- Main Content -->
        <div class="col-md-10">

  <section id="patient-info">
       <h1 class="mt-3">Chatbot</h1>
        <p>
<!--          Help the donor to participate in blood donation<br>-->
          <font color="red">{{msg}}</font>
        </p>

          {%csrf_token%}


<!--          <label for="address"></label>-->
<!--          <textarea id="address" name="answer" style="height:400px;"></textarea>-->
      <div id="result">
        <textarea name="t1" id="t1" rows="20" cols="80"></textarea>
        </div>

          <label for="patient-name">Question:</label>
          <input type="text" id="t2" name="t2" required />
          <button type="button" onclick="displayFullName()">Submit</button>

      </section>

        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
